services:
  - type: web
    name: mission-control
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOSTNAME
        value: 0.0.0.0
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: AUTH_PASS
        fromSync:
          - name: auth-pass
            key: password
      - key: AUTH_USER
        fromSync:
          - name: auth-user
            key: username
      # Hermes agent connection — set these in Render dashboard to point MC at your VPS
      # After setting, redeploy. Then visit https://<your-mc>.onrender.com/hermes
      - key: HERMES_ENABLED
        value: "true"
      - key: HERMES_GATEWAY_HOST
        sync: false     # set in dashboard, e.g. 1.2.3.4 (your VPS IP)
      - key: HERMES_GATEWAY_PORT
        sync: false     # set in dashboard, e.g. 8644
      - key: HERMES_API_KEY
        sync: false     # optional bearer token if your Hermes requires auth
    autoDeploy: true
    healthCheckPath: /api/status
    disk:
      name: mission-control-data
      mountPath: /app/.data
      sizeGB: 5

# Optional: Define environment variables separately for security
# You can also set these directly in Render dashboard
# envVars:
#   - key: AUTH_PASS
#     value: your-secure-password-here
#   - key: AUTH_USER
#     value: your-username-here