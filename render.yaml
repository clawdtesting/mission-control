services:
  - type: web
    name: mission-control
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: HOSTNAME
        value: 0.0.0.0
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: AUTH_PASS
        fromSync:
          - name: auth-pass
            key: password
      - key: AUTH_USER
        fromSync:
          - name: auth-user
            key: username
    autoDeploy: true
    healthCheckPath: /api/status
    disk:
      name: mission-control-data
      mountPath: /app/.data
      sizeGB: 5

# Optional: Define environment variables separately for security
# You can also set these directly in Render dashboard
# envVars:
#   - key: AUTH_PASS
#     value: your-secure-password-here
#   - key: AUTH_USER
#     value: your-username-here